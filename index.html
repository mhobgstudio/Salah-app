<!DOCTYPE html>
<html lang="en">
<head>
    <base href="/">
    <title>SalahLearn Noor - Premium Prayer Mastery</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Outfit:wght@300;400;600&family=Noto+Naskh+Arabic:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-emerald: #064e3b;
            --secondary-emerald: #065f46;
            --accent-gold: #d97706;
            --accent-gold-light: #fbbf24;
            --bg-cream: #fffbeb;
            --glass-white: rgba(255, 255, 255, 0.85);
            --text-main: #064e3b;
            --shadow-soft: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: var(--bg-cream);
            background-image: radial-gradient(circle at 20% 20%, rgba(6, 78, 59, 0.05) 0%, transparent 40%),
                              radial-gradient(circle at 80% 80%, rgba(217, 119, 6, 0.05) 0%, transparent 40%);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://www.transparenttextures.com/patterns/islamic-art.png');
            opacity: 0.03;
            pointer-events: none;
            z-index: -1;
        }

        .app-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 60px;
            padding: 40px;
            background: var(--glass-white);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            box-shadow: var(--shadow-soft);
            border: 1px solid rgba(217, 119, 6, 0.2);
        }

        .header h1 {
            font-family: 'Amiri', serif;
            font-size: 3.5rem;
            color: var(--primary-emerald);
            margin-bottom: 10px;
        }

        .header p {
            font-weight: 300;
            color: #4b5563;
            font-size: 1.1rem;
        }

        .pyramid-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            width: 100%;
            perspective: 1000px;
        }

        .pyramid-level {
            display: flex;
            justify-content: center;
            width: var(--level-width);
            transition: all 0.5s ease;
        }

        .level-card {
            flex: 1;
            background: var(--glass-white);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 35px;
            text-align: center;
            cursor: pointer;
            border: 1px solid rgba(6, 78, 59, 0.1);
            box-shadow: 0 4px 20px rgba(6, 78, 59, 0.05);
            transition: all 0.4s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .level-card:hover {
            transform: translateY(-10px);
            border-color: var(--accent-gold);
            background: white;
            box-shadow: 0 20px 40px rgba(6, 78, 59, 0.1);
        }

        .level-card.locked { opacity: 0.5; cursor: not-allowed; filter: grayscale(1); }

        .level-card h3 {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--accent-gold);
            margin-bottom: 8px;
        }

        .level-card h4 {
            font-family: 'Amiri', serif;
            font-size: 2.2rem;
            color: var(--primary-emerald);
            margin-bottom: 12px;
        }

        .level-card p { font-size: 1rem; color: #4b5563; line-height: 1.6; }

        .btn-start {
            background: linear-gradient(135deg, var(--primary-emerald) 0%, var(--secondary-emerald) 100%);
            color: white;
            border: none;
            padding: 14px 34px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        .btn-start:hover { transform: scale(1.05); background: var(--accent-gold); }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(4, 47, 46, 0.4);
            backdrop-filter: blur(12px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content-wrapper {
            background: var(--bg-cream);
            width: 95%; max-width: 1200px; height: 92vh;
            border-radius: 44px;
            position: relative; overflow: hidden;
            display: flex; flex-direction: column;
            border: 4px solid var(--glass-white);
            box-shadow: 0 50px 100px -20px rgba(0,0,0,0.3);
        }

        .close-modal {
            position: absolute; top: 25px; right: 30px;
            font-size: 30px; cursor: pointer; z-index: 10;
            color: var(--primary-emerald);
        }

        .tab-container {
            display: flex; background: rgba(6, 78, 59, 0.05);
            padding: 8px; border-radius: 20px; margin: 20px 50px;
        }

        .tab {
            flex: 1; text-align: center; padding: 12px;
            cursor: pointer; border-radius: 15px; font-weight: 600;
            transition: all 0.3s ease;
        }

        .tab.active { background: white; color: var(--accent-gold); box-shadow: var(--shadow-soft); }

        .lesson-content { flex: 1; overflow-y: auto; padding: 30px 50px; }

        /* Typography & Styling */
        .arabic-text { 
            font-family: 'Amiri', serif; 
            font-size: 3rem; 
            text-align: right; 
            color: var(--primary-emerald);
            line-height: 1.6;
            margin: 20px 0;
        }

        .transliteration { font-style: italic; color: var(--accent-gold); margin-bottom: 10px; font-size: 1.1rem; }
        .translation { font-size: 1.2rem; color: #374151; line-height: 1.5; }

        .verse-card { 
            background: white; 
            padding: 35px; 
            border-radius: 25px; 
            margin-bottom: 30px; 
            border-right: 8px solid var(--accent-gold);
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
        }

        .progress-bar-container { width: 100%; height: 12px; background: #e5e7eb; border-radius: 6px; margin: 20px 0; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--secondary-emerald), var(--accent-gold)); transition: width 0.5s ease; }

        .posture-image {
            max-width: 100%;
            height: auto;
            border-radius: 20px;
            margin: 20px 0;
            box-shadow: var(--shadow-soft);
        }

        .audio-controls {
            display: flex;
            gap: 15px;
            margin: 20px 0;
            align-items: center;
        }

        .btn-secondary {
            background: white;
            border: 2px solid var(--secondary-emerald);
            color: var(--secondary-emerald);
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-secondary:hover {
            background: var(--secondary-emerald);
            color: white;
        }

        .explanation-components {
            margin-top: 30px;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }

        .component h4 { color: var(--accent-gold); margin: 15px 0 10px; }

        .verse-item {
            padding: 15px;
            background: rgba(6, 78, 59, 0.03);
            border-radius: 12px;
            margin-bottom: 10px;
        }

        .verse-number { font-weight: 600; color: var(--secondary-emerald); font-size: 0.9rem; margin-bottom: 5px; }

        /* Progress Rings */
        .progress-ring { width: 70px; height: 70px; margin-bottom: 15px; }
        .progress-ring circle { fill: transparent; stroke-width: 8; }
        .progress-ring .background { stroke: #f3f4f6; }
        .progress-ring .foreground { stroke: var(--accent-gold); stroke-linecap: round; transition: stroke-dashoffset 0.5s ease; }

    </style>
</head>
<body>
    <div class="app-container">
        <header class="header">
            <h1>SalahLearn Noor</h1>
            <p>A premium sanctuary for mastering the sacred dialogue of Salah.</p>
        </header>

        <main id="levelsContainer">
            <!-- Dynamic Levels Content -->
        </main>
    </div>

    <!-- Universal Modal -->
    <div id="levelModal" class="modal">
        <div class="modal-content-wrapper">
            <span class="close-modal" onclick="closeModal()">&#xd7;</span>
            
            <!-- Level Overview Stage -->
            <div id="modalOverview" style="padding: 50px;">
                <h2 id="modalLevelTitle" style="font-family: Amiri; font-size: 3rem; color: var(--primary-emerald);"></h2>
                <p id="modalLevelDesc" style="font-size: 1.2rem; margin: 20px 0; color: #4b5563;"></p>
                <div id="levelTopics" style="display: flex; gap: 10px; margin-bottom: 30px; flex-wrap: wrap;"></div>
                
                <h3 style="margin-bottom: 15px;">Curriculum:</h3>
                <div id="lessonList" style="display: grid; gap: 15px;"></div>
            </div>

            <!-- Active Lesson Stage -->
            <div id="lessonContainer" style="display:none; flex-direction: column; height: 100%;">
                <div class="tab-container">
                    <div class="tab active" onclick="switchTab('overview')">Overview</div>
                    <div class="tab" onclick="switchTab('demonstration')">Demonstration</div>
                    <div class="tab" onclick="switchTab('practice')">Practice</div>
                    <div class="tab" onclick="switchTab('quiz')">Quiz</div>
                </div>
                
                <div class="lesson-content" id="lessonContent"></div>

                <div style="padding: 25px 50px; background: white; border-top: 1px solid #eee; display: flex; align-items: center; justify-content: space-between;">
                    <button class="btn-secondary" onclick="previousStep()">Previous Step</button>
                    <div style="flex: 1; margin: 0 40px;">
                        <div class="progress-bar-container">
                            <div id="lessonProgress" class="progress-fill" style="width: 0%"></div>
                        </div>
                    </div>
                    <button class="btn-start" onclick="nextStep()" style="margin-top:0;">Next Step</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Application Data and Logic -->
    <script src="levels.js"></script>
    <script>
        // State Management
        const userRewards = { points: 0, badges: [], streak: 0, lastCompleted: null };
        let currentLesson = { levelId: null, lessonIndex: 0, step: 'overview', progress: 0 };
        let demoState = { currentPostureIndex: 0, isPlaying: false, playbackSpeed: 1, demoProgress: 0 };

        // Initialization
        window.addEventListener('load', () => {
            renderLevels();
        });

        function createProgressRing(progress) {
            const radius = 30;
            const circumference = 2 * Math.PI * radius;
            const offset = circumference - (progress / 100) * circumference;
            return `
                <svg class="progress-ring" viewBox="0 0 100 100">
                    <circle class="background" cx="50" cy="50" r="${radius}" />
                    <circle class="foreground" cx="50" cy="50" r="${radius}" 
                            style="stroke-dasharray: ${circumference}; stroke-dashoffset: ${offset};"
                            transform="rotate(-90 50 50)" />
                    <text x="50" y="58" text-anchor="middle" fill="var(--primary-emerald)" font-weight="600" font-size="16">${Math.round(progress)}%</text>
                </svg>`;
        }

        function renderLevels() {
            const container = document.getElementById('levelsContainer');
            if (!container) return;
            container.innerHTML = '';
            
            const pyramidContainer = document.createElement('div');
            pyramidContainer.className = 'pyramid-container';
            
            const baseWidth = 100;
            const widthDecrement = (baseWidth - 40) / (levels.length - 1);
            
            // Build pyramid from bottom (Level 7) to top (Level 1)
            for (let i = levels.length - 1; i >= 0; i--) {
                const level = levels[i];
                const width = baseWidth - (levels.length - 1 - i) * widthDecrement;
                const pyramidLevel = document.createElement('div');
                pyramidLevel.className = 'pyramid-level';
                pyramidLevel.style.setProperty('--level-width', `${width}%`);
                
                pyramidLevel.innerHTML = `
                    <div class="level-card ${!level.unlocked ? 'locked' : ''}" 
                         onclick="${level.unlocked ? `openLevel(${level.id})` : ''}">
                        ${createProgressRing(level.progress)}
                        <h3>Level ${level.id}</h3>
                        <h4>${level.title}</h4>
                        <p>${level.description}</p>
                        ${level.unlocked ? '<button class="btn-start">Enter Level</button>' : '<p style="color:#9ca3af; margin-top:10px;">Locked</p>'}
                    </div>`;
                pyramidContainer.appendChild(pyramidLevel);
            }
            container.appendChild(pyramidContainer);
        }

        function openLevel(levelId) {
            const level = levels.find(l => l.id === levelId);
            if (!level) return;
            
            currentLesson.levelId = levelId;
            const modal = document.getElementById('levelModal');
            document.getElementById('modalLevelTitle').textContent = level.title;
            document.getElementById('modalLevelDesc').textContent = level.description;
            document.getElementById('levelTopics').innerHTML = level.topics.map(t => `<span style="background:rgba(6,78,59,0.1); padding:5px 15px; border-radius:20px; font-size:0.9rem;">${t}</span>`).join('');
            
            document.getElementById('lessonList').innerHTML = level.lessons.map((l, i) => `
                <div style="background:white; padding:20px; border-radius:15px; border:1px solid #eee; display:flex; justify-content:space-between; cursor:pointer;" onclick="startLesson(${i})">
                    <span style="font-weight:600;">${l.title}</span>
                    <span style="color:var(--accent-gold);">Start →</span>
                </div>
            `).join('');

            modal.style.display = 'flex';
            document.getElementById('modalOverview').style.display = 'block';
            document.getElementById('lessonContainer').style.display = 'none';
        }

        function closeModal() {
            document.getElementById('levelModal').style.display = 'none';
        }

        function startLesson(index) {
            currentLesson.lessonIndex = index;
            currentLesson.step = 'overview';
            currentLesson.progress = 0;
            
            document.getElementById('modalOverview').style.display = 'none';
            document.getElementById('lessonContainer').style.display = 'flex';
            updateLessonContent();
        }

        function switchTab(tab) {
            currentLesson.step = tab;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`.tab[onclick*="${tab}"]`).classList.add('active');
            updateLessonContent();
        }

        function updateLessonContent() {
            const level = levels.find(l => l.id === currentLesson.levelId);
            const lesson = level.lessons[currentLesson.lessonIndex];
            const content = document.getElementById('lessonContent');
            
            switch(currentLesson.step) {
                case 'overview':
                    content.innerHTML = `
                        <h2 style="font-size:2rem; margin-bottom:15px;">${lesson.title}</h2>
                        <div class="verse-card">
                            <h4 style="color:var(--secondary-emerald); margin-bottom:10px;">Learning Objectives:</h4>
                            <ul style="margin-left:20px;">
                                ${lesson.objectives.map(o => `<li>${o}</li>`).join('')}
                            </ul>
                        </div>
                        <p style="font-size:1.1rem; line-height:1.7;">${lesson.content}</p>
                    `;
                    break;
                    
                case 'demonstration':
                    content.innerHTML = `
                        <h2 style="margin-bottom:10px;">Full Prayer Walkthrough</h2>
                        <p style="color:#6b7280; margin-bottom:30px;">Review every step below before proceeding to Practice.</p>
                        ${lesson.postures.map((p, i) => `
                            <div class="posture-section" style="margin-bottom:40px; padding-bottom:30px; border-bottom:2px solid rgba(6,78,59,0.1);">
                                <div style="display:flex; align-items:center; gap:15px; margin-bottom:20px;">
                                    <span style="background:var(--accent-gold); color:white; width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:700; flex-shrink:0;">${i+1}</span>
                                    <h3 style="font-size:1.4rem; color:var(--primary-emerald);">${p.name}</h3>
                                </div>
                                <div style="text-align:center; margin-bottom:20px;">${postureImages[p.image] || ''}</div>
                                ${(p.recitations || []).map(r => `
                                    <div class="verse-card">
                                        <div class="arabic-text">${r.arabic || ''}</div>
                                        ${r.transliteration ? `<div class="transliteration">${r.transliteration}</div>` : ''}
                                        ${r.translation ? `<div class="translation">${r.translation}</div>` : ''}
                                        ${r.explanation ? `<div class="explanation-components">${getExplanationHTML(r.explanation)}</div>` : ''}
                                    </div>
                                `).join('')}
                                ${p.practice_tips ? `
                                    <div style="background:rgba(217,119,6,0.06); border-left:4px solid var(--accent-gold); padding:20px; border-radius:0 15px 15px 0; margin-top:15px;">
                                        <h4 style="color:var(--accent-gold); margin-bottom:10px;">💡 Practice Tips</h4>
                                        ${Object.entries(p.practice_tips).map(([key, val]) => `
                                            <p style="margin-bottom:8px;"><strong>${key.replace(/_/g,' ').replace(/\b\w/g,l=>l.toUpperCase())}:</strong> ${val}</p>
                                        `).join('')}
                                    </div>
                                ` : ''}
                            </div>
                        `).join('')}
                    `;
                    break;

                case 'practice':
                    content.innerHTML = `
                        <h2>Practice Mode</h2>
                        <div class="verse-card">
                            ${lesson.practice || '<p>Follow the demonstration patterns to master the flow.</p>'}
                        </div>
                    `;
                    break;

                case 'quiz':
                    content.innerHTML = `
                        <h2>Knowledge Check</h2>
                        <div id="quizArea">
                            ${lesson.quiz.map((q, i) => `
                                <div class="verse-card">
                                    <p style="font-weight:600; margin-bottom:15px;">${q.question}</p>
                                    <div style="display:grid; gap:10px;">
                                        ${q.options.map((opt, optIdx) => `
                                            <button class="btn-secondary" onclick="checkAnswer(${i}, ${optIdx}, ${q.correct})">${opt}</button>
                                        `).join('')}
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    `;
                    break;
            }
            
            document.getElementById('lessonProgress').style.width = `${currentLesson.progress}%`;
        }

        function checkAnswer(qIdx, selected, correct) {
            if(selected === correct) {
                alert("Correct! Excellent focus.");
            } else {
                alert("Not quite. Pure focus leads to wisdom. Try again.");
            }
        }

        function nextStep() {
            const steps = ['overview', 'demonstration', 'practice', 'quiz'];
            const curIdx = steps.indexOf(currentLesson.step);
            if(curIdx < steps.length - 1) {
                currentLesson.progress += 25;
                switchTab(steps[curIdx+1]);
            } else {
                completeLesson();
            }
        }

        function previousStep() {
            const steps = ['overview', 'demonstration', 'practice', 'quiz'];
            const curIdx = steps.indexOf(currentLesson.step);
            if(curIdx > 0) {
                currentLesson.progress -= 25;
                switchTab(steps[curIdx-1]);
            }
        }

        function completeLesson() {
            const level = levels.find(l => l.id === currentLesson.levelId);
            level.progress = Math.min(100, level.progress + (100 / level.lessons.length));
            if(level.progress >= 100 && currentLesson.levelId < levels.length) {
                levels.find(l => l.id === currentLesson.levelId + 1).unlocked = true;
            }
            renderLevels();
            closeModal();
            alert("Lesson complete! You've gained 100 Noor points.");
        }

        function getExplanationHTML(exp) {
            if(!exp) return '';
            if(typeof exp === 'string') return `<p>${exp}</p>`;
            let html = '';
            if(exp.summary) html += `<p><strong>Note:</strong> ${exp.summary}</p>`;
            if(exp.significance) html += `<p style="color:var(--accent-gold);"><em>${exp.significance}</em></p>`;
            if(exp.components) {
                html += exp.components.map(c => `
                    <div class="component">
                        <h4>${c.component}</h4>
                        ${Array.isArray(c.description) ? 
                            c.description.map(v => `
                                <div class="verse-item">
                                    <div class="verse-number">Verse ${v.verse}</div>
                                    <div class="arabic-text" style="font-size:1.8rem;">${v.arabic}</div>
                                    ${v.transliteration ? `<div class="transliteration">${v.transliteration}</div>` : ''}
                                    <p>${v.translation}</p>
                                </div>`).join('') : 
                            `<p>${c.description}</p>`}
                    </div>
                `).join('');
            }
            if(exp.steps) {
                html += '<div style="margin-top:15px;"><strong>Steps:</strong><ol style="margin-left:20px;">' + exp.steps.map(s => `<li><strong>${s.description}:</strong> ${s.details}</li>`).join('') + '</ol></div>';
            }
            if(exp.recommended_practices) {
                html += '<div style="margin-top:15px;"><strong>Recommended:</strong><ul style="margin-left:20px;">' + exp.recommended_practices.map(r => `<li>${r}</li>`).join('') + '</ul></div>';
            }
            if(exp.spiritual_benefits) {
                html += '<div style="margin-top:15px;"><strong>Spiritual Benefits:</strong><ul style="margin-left:20px;">' + exp.spiritual_benefits.map(b => `<li>${b}</li>`).join('') + '</ul></div>';
            }
            return html;
        }

    </script>
</body>
</html>
